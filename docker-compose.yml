# Test — Angular client (`client/`) + ASP.NET Core API (`Test.Api/`)
#
# Stack (default):
#   docker compose up --build
#   UI:  http://localhost:4201  (proxies /api → api container)
#   API: http://localhost:5102  (direct, Swagger in Development)
#
# Production-style static UI + API:
#   docker compose --profile prod up --build
#   UI: http://localhost:8082
#
# SQLite database is persisted in volume `test_api_data`.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5102:8080"
    volumes:
      - test_api_data:/data
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Data Source=/data/Test.db

  client:
    image: node:22-bookworm
    working_dir: /app
    depends_on:
      - api
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    command: >
      sh -c "npm ci && npm run start -- --configuration docker --host 0.0.0.0 --port 4200 --poll 500"
    ports:
      - "4201:4200"
    environment:
      NODE_ENV: development
      NG_CLI_ANALYTICS: "false"
      CI: "true"
    tty: true

  web:
    profiles:
      - prod
    build:
      context: ./client
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "8082:80"

volumes:
  client_node_modules:
  test_api_data:
