@if (isLoading()) {
    <div
      class="global-loader-overlay fixed inset-0 z-[9999] flex items-center justify-center bg-base-300/60"
      role="status"
      aria-live="polite"
      aria-busy="true"
      aria-label="Loading"
    >
      <span class="loading loading-spinner loading-lg text-primary" aria-hidden="true"></span>
        Loading...
    </div>
  }
