<div class="border-b border-base-200 pb-2">
  <nav
    class="breadcrumbs pl-4 text-xs text-base-content/75 sm:pl-5 sm:text-sm"
    [attr.aria-label]="ariaLabel()"
  >
    <ul>
      @for (label of items(); track $index) {
        <li>
          @if ($index === items().length - 1) {
            <span class="font-medium text-base-content" aria-current="page">{{ label }}</span>
          } @else {
            <span class="text-base-content/75">{{ label }}</span>
          }
        </li>
      }
    </ul>
  </nav>
</div>
