<header
  class="sticky top-0 z-30 flex h-14 w-full items-center gap-2 border-b border-gray-200 bg-white px-4 shadow-sm"
  role="banner"
>
  <div class="flex flex-1 items-center gap-2">
    <button
      type="button"
      class="rounded-lg p-2 text-gray-600 transition-colors hover:bg-gray-100 hover:text-gray-900"
      (click)="sidebarState.toggle()"
      [attr.aria-label]="sidebarState.collapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
      [attr.aria-expanded]="!sidebarState.collapsed()"
    >
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </div>

  <div class="flex items-center gap-2">
    <div class="relative">
      <button
        type="button"
        class="flex items-center gap-2 rounded-lg px-2 py-1.5 text-gray-700 transition-colors hover:bg-gray-100"
        (click)="toggleUserMenu()"
        [attr.aria-expanded]="userMenuOpen()"
        aria-haspopup="true"
        aria-controls="user-dropdown-menu"
        id="user-menu-trigger"
      >
        <span class="flex h-8 w-8 items-center justify-center rounded-full bg-indigo-600 text-sm font-medium text-white">
          {{ userInitial() }}
        </span>
        <span class="max-w-32 truncate text-sm font-medium text-gray-900" [title]="userName()">
          {{ userName() }}
        </span>
        <svg
          class="h-4 w-4 text-gray-500 transition-transform"
          [class.rotate-180]="userMenuOpen()"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      @if (userMenuOpen()) {
        <ul
          id="user-dropdown-menu"
          role="menu"
          class="absolute right-0 top-full z-50 mt-1 w-52 rounded-lg border border-gray-200 bg-white py-1 shadow-lg"
        >
          <li role="none">
            <button
              type="button"
              role="menuitem"
              class="flex w-full items-center gap-2 px-4 py-2 text-left text-sm text-red-600 hover:bg-red-50"
              (click)="onLogout()"
            >
              <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
              Logout
            </button>
          </li>
        </ul>
      }
    </div>
  </div>
</header>
